<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stonecraft</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }

    #wrap {
      position: relative;
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.4);
      border: 4px solid #2f2f2f;
    }

    canvas {
      display: block;
      background: linear-gradient(#7cc7ff, #e8f7ff);
    }

    #hud {
      position: absolute;
      top: 12px;
      left: 12px;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.68);
      border-radius: 8px;
      line-height: 1.45;
      font-size: 14px;
      pointer-events: none;
    }

    #hud b {
      color: #ffd54f;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="960" height="540"></canvas>
    <div id="hud">
      <div><b>Stonecraft</b></div>
      <div>Move: A/D or arrows • Jump: W / Space</div>
      <div>Mine: click nearby blocks</div>
      <div>Iron: <span id="ironCount">0</span> • Gun: <span id="gunState">not crafted</span></div>
      <div>Goal: kill the giant on the mountain</div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const hudIron = document.getElementById("ironCount");
    const hudGun = document.getElementById("gunState");

    const tile = 32;
    const worldWidth = 1800;
    const worldCols = Math.floor(worldWidth / tile);
    const worldRows = 16;
    const blocks = new Map();
    const keys = {};
    const bullets = [];
    const mouse = { x: 0, y: 0, down: false };

    let cameraX = 0;
    let shootCooldown = 0;
    let message = "Iron is easy to find. No diamonds, no emeralds, no nether, no end.";
    let messageTimer = 0;
    let lastTime = performance.now();

    const player = {
      x: 140,
      y: 0,
      w: 28,
      h: 46,
      vx: 0,
      vy: 0,
      grounded: false,
      facing: 1,
      iron: 0,
      gun: false,
      hp: 100
    };

    const giant = {
      x: 0,
      y: 0,
      w: 90,
      h: 170,
      hp: 60,
      alive: true
    };

    function generateTerrain() {
      const heights = [];
      for (let col = 0; col < worldCols; col += 1) {
        let h = 10 + Math.floor(Math.sin(col / 6) * 2 + Math.cos(col / 8) * 1.6);
        if (col > 42 && col < 60) {
          h += 3 + (col - 42) * 0.85;
        } else if (col >= 60) {
          h += 2;
        }
        heights.push(Math.max(8, Math.min(14, h)));
      }

      blocks.clear();
      for (let col = 0; col < worldCols; col += 1) {
        const h = heights[col];
        for (let row = 0; row < worldRows; row += 1) {
          const key = `${col},${row}`;
          if (row < h - 2) {
            blocks.set(key, { col, row, type: "stone" });
          } else if (row < h) {
            blocks.set(key, { col, row, type: "dirt" });
          } else if (row === h) {
            blocks.set(key, { col, row, type: "grass" });
          } else {
            blocks.set(key, { col, row, type: "air" });
          }
        }
      }

      for (let col = 1; col < worldCols - 1; col += 1) {
        for (let row = 2; row < heights[col] - 2; row += 1) {
          const key = `${col},${row}`;
          const block = blocks.get(key);
          if (block && block.type === "stone" && Math.random() < 0.3) {
            blocks.set(key, { col, row, type: "iron" });
          }
        }
      }

      const mountainCol = 54;
      giant.x = mountainCol * tile + 48;
      giant.y = heights[mountainCol] * tile - giant.h - 18;
    }

    function getBlockAtWorld(x, y) {
      const col = Math.floor(x / tile);
      const row = Math.floor(y / tile);
      if (col < 0 || col >= worldCols || row < 0 || row >= worldRows) {
        return null;
      }
      return blocks.get(`${col},${row}`);
    }

    function intersectsSolid(x, y, w, h) {
      const points = [
        [x + 2, y + 2],
        [x + w - 3, y + 2],
        [x + 2, y + h - 3],
        [x + w - 3, y + h - 3],
        [x + w / 2, y + 2],
        [x + w / 2, y + h - 3]
      ];
      return points.some(([px, py]) => {
        const block = getBlockAtWorld(px, py);
        return block && block.type !== "air";
      });
    }

    function spawnPlayer() {
      const spawnCol = 2;
      player.x = 140;
      player.y = (Math.max(8, 10) * tile) - player.h - 2;
      player.vx = 0;
      player.vy = 0;
      player.grounded = false;
      player.iron = 0;
      player.gun = false;
      player.hp = 100;
      giant.hp = 60;
      giant.alive = true;
      bullets.length = 0;
      cameraX = 0;
      message = "Iron is easy to find. No diamonds, no emeralds, no nether, no end.";
      messageTimer = 3;
    }

    function craftGunIfPossible() {
      if (player.iron >= 10 && !player.gun) {
        player.gun = true;
        message = "Gun crafted! Press space to fire infinite bullets.";
        messageTimer = 3;
      }
    }

    function breakBlockAtScreen(screenX, screenY) {
      const worldX = screenX + cameraX;
      const worldY = screenY;
      const block = getBlockAtWorld(worldX, worldY);
      if (!block || block.type === "air") return;

      const dx = (block.col * tile + tile / 2) - (player.x + player.w / 2);
      const dy = (block.row * tile + tile / 2) - (player.y + player.h / 2);
      if (Math.hypot(dx, dy) > 140) return;

      if (block.type === "iron") {
        player.iron += 1;
        craftGunIfPossible();
      }

      blocks.set(`${block.col},${block.row}`, { col: block.col, row: block.row, type: "air" });
    }

    function shoot() {
      if (!player.gun) return;
      const aimX = mouse.x + cameraX;
      const aimY = mouse.y;
      const dirX = aimX - (player.x + player.w / 2);
      const dirY = aimY - (player.y + player.h / 2);
      const dist = Math.hypot(dirX, dirY) || 1;
      bullets.push({
        x: player.x + player.w / 2,
        y: player.y + player.h / 2,
        vx: (dirX / dist) * 760,
        vy: (dirY / dist) * 760,
        life: 1.2
      });
    }

    function update(dt) {
      const left = keys["ArrowLeft"] || keys["a"] || keys["A"];
      const right = keys["ArrowRight"] || keys["d"] || keys["D"];
      const jump = keys["ArrowUp"] || keys["w"] || keys["W"] || keys[" "];

      let move = 0;
      if (right) move += 1;
      if (left) move -= 1;
      player.vx = move * 240;

      if (jump && player.grounded) {
        player.vy = -360;
        player.grounded = false;
      }

      player.vy += 900 * dt;
      player.x += player.vx * dt;
      if (intersectsSolid(player.x, player.y, player.w, player.h)) {
        player.x -= player.vx * dt;
        player.vx = 0;
      }

      player.y += player.vy * dt;
      if (intersectsSolid(player.x, player.y, player.w, player.h)) {
        player.y -= player.vy * dt;
        player.vy = 0;
        player.grounded = true;
      } else {
        player.grounded = false;
      }

      player.facing = player.vx >= 0 ? 1 : -1;
      if (player.x < 0) player.x = 0;
      if (player.x + player.w > worldWidth) player.x = worldWidth - player.w;

      cameraX = player.x + player.w / 2 - canvas.width / 2;
      cameraX = Math.max(0, Math.min(worldWidth - canvas.width, cameraX));

      if (shootCooldown > 0) shootCooldown -= dt;
      if (keys[" "] && shootCooldown <= 0 && player.gun) {
        shoot();
        shootCooldown = 0.18;
      }

      for (let i = bullets.length - 1; i >= 0; i -= 1) {
        const bullet = bullets[i];
        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;
        bullet.life -= dt;
        if (bullet.life <= 0) {
          bullets.splice(i, 1);
          continue;
        }
        if (giant.alive && bullet.x > giant.x && bullet.x < giant.x + giant.w && bullet.y > giant.y && bullet.y < giant.y + giant.h) {
          giant.hp -= 1;
          bullets.splice(i, 1);
          if (giant.hp <= 0) {
            giant.alive = false;
            message = "You killed the giant!";
            messageTimer = 4;
          }
        }
      }

      hudIron.textContent = player.iron;
      hudGun.textContent = player.gun ? "crafted" : "not crafted";

      if (messageTimer > 0) {
        messageTimer -= dt;
      }
    }

    function drawBackground() {
      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#7cc7ff");
      sky.addColorStop(1, "#edf7ff");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#f7d96c";
      ctx.beginPath();
      ctx.arc(780, 90, 60, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawWorld() {
      ctx.save();
      ctx.translate(-cameraX, 0);
      for (const block of blocks.values()) {
        if (block.type === "air") continue;
        const x = block.col * tile;
        const y = block.row * tile;
        if (block.type === "grass") {
          ctx.fillStyle = "#5fbe4b";
        } else if (block.type === "dirt") {
          ctx.fillStyle = "#8d5d2f";
        } else if (block.type === "stone") {
          ctx.fillStyle = "#8f8f8f";
        } else if (block.type === "iron") {
          ctx.fillStyle = "#b9734b";
        }
        ctx.fillRect(x, y, tile, tile);
        ctx.strokeStyle = "rgba(0,0,0,0.2)";
        ctx.strokeRect(x, y, tile, tile);
      }

      if (giant.alive) {
        ctx.fillStyle = "#5b4d3a";
        ctx.fillRect(giant.x, giant.y, giant.w, giant.h);
        ctx.fillStyle = "#2d241f";
        ctx.fillRect(giant.x + 16, giant.y + 25, giant.w - 32, giant.h - 60);
        ctx.fillStyle = "#f4e9d4";
        ctx.fillRect(giant.x + 24, giant.y + 42, 16, 16);
        ctx.fillRect(giant.x + 50, giant.y + 42, 16, 16);
        ctx.fillRect(giant.x + 35, giant.y + 72, 20, 12);
      }

      ctx.fillStyle = "#2f6f8c";
      ctx.fillRect(player.x, player.y, player.w, player.h);
      ctx.fillStyle = "#e7c08c";
      ctx.fillRect(player.x + 4, player.y + 6, player.w - 8, 10);
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(player.x + 8, player.y + 20, 6, 10);
      ctx.fillRect(player.x + 14, player.y + 20, 6, 10);
      ctx.fillRect(player.x + 9, player.y + 36, 10, 10);
      if (player.gun) {
        ctx.fillStyle = "#444";
        ctx.fillRect(player.x + player.w - 8, player.y + 16, 8, 10);
      }

      ctx.fillStyle = "#ff6b6b";
      bullets.forEach((bullet) => {
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 4, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.restore();
    }

    function drawUI() {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(18, 18, 300, 80);
      ctx.fillStyle = "white";
      ctx.font = "16px Arial";
      ctx.fillText(message, 30, 44);
      if (player.gun) {
        ctx.fillText("Infinite bullets ready.", 30, 68);
      }
    }

    function loop(now) {
      const dt = Math.min(0.033, (now - lastTime) / 1000);
      lastTime = now;
      update(dt);
      drawBackground();
      drawWorld();
      drawUI();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", (event) => {
      keys[event.key] = true;
      if (["ArrowLeft", "ArrowRight", "ArrowUp", " ", "w", "a", "d"].includes(event.key)) {
        event.preventDefault();
      }
    });

    window.addEventListener("keyup", (event) => {
      keys[event.key] = false;
    });

    canvas.addEventListener("mousedown", (event) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      mouse.x = (event.clientX - rect.left) * scaleX;
      mouse.y = (event.clientY - rect.top) * scaleY;
      mouse.down = true;
      breakBlockAtScreen(mouse.x, mouse.y);
    });

    canvas.addEventListener("mousemove", (event) => {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      mouse.x = (event.clientX - rect.left) * scaleX;
      mouse.y = (event.clientY - rect.top) * scaleY;
    });

    window.addEventListener("mouseup", () => {
      mouse.down = false;
    });

    generateTerrain();
    spawnPlayer();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
