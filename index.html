<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Night Forest</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1d2f4d 0%, #060b13 70%, #020306 100%);
        font-family: Arial, Helvetica, sans-serif;
      }

      .forest {
        position: relative;
        width: min(92vw, 900px);
        height: min(78vh, 620px);
        overflow: hidden;
        border-radius: 28px;
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.45);
        background: linear-gradient(180deg, #0f1a2b 0%, #172b42 45%, #2b4c33 45%, #16261d 100%);
      }

      .moon {
        position: absolute;
        top: 50px;
        right: 70px;
        width: 110px;
        height: 110px;
        border-radius: 50%;
        background: radial-gradient(circle, #fdf7bf 0%, #f2d87d 40%, #a88b3d 80%, transparent 81%);
        box-shadow: 0 0 40px rgba(255, 221, 129, 0.35);
      }

      .inventory {
        position: absolute;
        top: 18px;
        left: 18px;
        z-index: 10;
        background: rgba(8, 13, 20, 0.8);
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 14px;
        padding: 12px 14px;
        color: #f4efe4;
        backdrop-filter: blur(6px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      }

      .inventory h1 {
        margin: 0 0 8px;
        font-size: 16px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 6px 0;
        font-size: 14px;
      }

      .icon {
        display: inline-grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(255,255,255,0.12);
        font-size: 14px;
      }

      .hint {
        margin-top: 8px;
        font-size: 12px;
        color: #b7c0c8;
      }

      .craft-panel {
        position: absolute;
        top: 18px;
        right: 18px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
      }

      .craft-button {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        background: linear-gradient(135deg, #5d3b1e, #302112);
        color: #f8e7c7;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
      }

      .craft-button.house {
        background: linear-gradient(135deg, #7c5b3d, #4e3523);
      }

      .craft-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        box-shadow: none;
      }

      .craft-status {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(8, 13, 20, 0.8);
        color: #f4efe4;
        font-size: 12px;
        border: 1px solid rgba(255,255,255,0.16);
      }

      .resource-status {
        position: absolute;
        bottom: 18px;
        left: 18px;
        z-index: 10;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(8, 13, 20, 0.8);
        color: #f4efe4;
        font-size: 12px;
        border: 1px solid rgba(255,255,255,0.16);
      }

      .stars {
        position: absolute;
        inset: 0;
      }

      .star {
        position: absolute;
        background: #fff;
        border-radius: 50%;
        opacity: 0.85;
        animation: twinkle 3s infinite ease-in-out;
      }

      .star::before {
        content: "";
        position: absolute;
        inset: -2px;
        background: inherit;
        border-radius: 50%;
        filter: blur(2px);
      }

      .star-1 { width: 3px; height: 3px; left: 12%; top: 18%; }
      .star-2 { width: 2px; height: 2px; left: 24%; top: 12%; animation-delay: 0.8s; }
      .star-3 { width: 4px; height: 4px; right: 18%; top: 26%; animation-delay: 1.2s; }
      .star-4 { width: 2px; height: 2px; right: 34%; top: 16%; animation-delay: 2s; }
      .star-5 { width: 3px; height: 3px; left: 48%; top: 9%; animation-delay: 1.6s; }

      .fog {
        position: absolute;
        inset: auto 0 0;
        height: 120px;
        background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.16) 100%);
        filter: blur(8px);
        animation: drift 10s linear infinite;
      }

      .fog-2 {
        height: 90px;
        opacity: 0.6;
        animation-duration: 14s;
      }

      .hill {
        position: absolute;
        bottom: 0;
        border-radius: 50% 50% 0 0;
      }

      .objective-mountain {
        position: absolute;
        right: 70px;
        top: 120px;
        width: 220px;
        height: 220px;
        clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
        background: linear-gradient(180deg, #4d473f 0%, #2a241f 100%);
        box-shadow: inset 0 -20px 0 rgba(0,0,0,0.3);
      }

      .objective-mountain::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 24px;
        transform: translateX(-50%);
        width: 96px;
        height: 86px;
        background: radial-gradient(circle, #6b1a1a 0%, #2a0505 70%, transparent 71%);
        border-radius: 50%;
        box-shadow: 0 0 24px rgba(255, 0, 0, 0.18);
      }

      .objective-mountain::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 54px;
        transform: translateX(-50%);
        width: 84px;
        height: 64px;
        border: 5px solid rgba(255,255,255,0.14);
        border-top: 0;
        border-radius: 0 0 999px 999px;
      }

      .hill-back {
        width: 74%;
        height: 190px;
        left: -8%;
        background: #2f4a2f;
      }

      .hill-mid {
        width: 64%;
        height: 230px;
        right: -8%;
        background: #304c31;
      }

      .hill-front {
        width: 100%;
        height: 180px;
        left: 0;
        background: #243b24;
        transform: translateY(25px);
      }

      .tree {
        position: absolute;
        bottom: 70px;
      }

      .tree .trunk {
        position: absolute;
        left: 50%;
        bottom: 0;
        transform: translateX(-50%);
        width: 16px;
        height: 72px;
        background: linear-gradient(180deg, #503223 0%, #321a10 100%);
        border-radius: 6px 6px 2px 2px;
      }

      .tree .canopy {
        position: absolute;
        left: 50%;
        bottom: 55px;
        transform: translateX(-50%);
        width: 90px;
        height: 90px;
        background: radial-gradient(circle at 30% 30%, #5c964f 0%, #2c612d 70%, #16331b 100%);
        border-radius: 50%;
        box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.04);
      }

      .tree-small .canopy {
        width: 70px;
        height: 70px;
        bottom: 45px;
      }

      .tree-small .trunk {
        height: 56px;
      }

      .tree-1 { left: 8%; }
      .tree-2 { left: 20%; }
      .tree-3 { left: 34%; }
      .tree-4 { left: 47%; }
      .tree-5 { left: 62%; }
      .tree-6 { right: 8%; }
      .tree-7 { left: 74%; bottom: 84px; }
      .tree-8 { left: 15%; bottom: 92px; }
      .tree-9 { left: 56%; bottom: 90px; }
      .tree-10 { right: 24%; bottom: 78px; }

      .tree-small {
        transform: scale(0.8);
      }

      .grass {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 70px;
        background: linear-gradient(180deg, #2f5d30 0%, #17361b 100%);
      }

      .iron {
        position: absolute;
        bottom: 70px;
        width: 32px;
        height: 22px;
        background: linear-gradient(135deg, #9ca3ab 0%, #626973 40%, #2e3338 100%);
        border-radius: 10px 10px 6px 6px;
        box-shadow: inset 0 0 0 2px rgba(255,255,255,0.16), 0 0 8px rgba(0,0,0,0.22);
        opacity: 0.9;
      }

      .iron::before {
        content: "";
        position: absolute;
        inset: 2px 6px auto;
        height: 8px;
        border-radius: 999px;
        background: rgba(255,255,255,0.16);
      }

      .iron-a { left: 18%; }
      .iron-b { left: 49%; transform: rotate(10deg) scale(1.1); }
      .iron-c { right: 17%; transform: rotate(-12deg) scale(0.95); }

      .monster {
        position: absolute;
        bottom: 74px;
        width: 96px;
        height: 110px;
        background: linear-gradient(180deg, #0f0f0f 0%, #1b1b1b 100%);
        border-radius: 46% 54% 48% 52%;
        box-shadow: inset 0 0 0 4px rgba(255,255,255,0.06), 0 0 22px rgba(0,0,0,0.4);
        animation: lurch 2.2s ease-in-out infinite;
      }

      .titan {
        position: absolute;
        right: 88px;
        top: 54px;
        width: 120px;
        height: 160px;
        transform: rotate(8deg);
      }

      .titan .head {
        position: absolute;
        left: 50%;
        top: 0;
        transform: translateX(-50%);
        width: 86px;
        height: 78px;
        background: linear-gradient(180deg, #8a7b6d 0%, #4d4036 100%);
        border-radius: 42% 42% 46% 46%;
        box-shadow: 0 0 32px rgba(0,0,0,0.3);
      }

      .titan .head::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 18px;
        transform: translateX(-50%);
        width: 44px;
        height: 30px;
        border-radius: 50%;
        border: 4px solid rgba(255,255,255,0.15);
        border-top: 0;
      }

      .titan .body {
        position: absolute;
        left: 50%;
        top: 70px;
        transform: translateX(-50%);
        width: 96px;
        height: 90px;
        background: linear-gradient(180deg, #3d3127 0%, #18110d 100%);
        border-radius: 24px 24px 30px 30px;
      }

      .titan .arm {
        position: absolute;
        top: 78px;
        width: 18px;
        height: 70px;
        background: linear-gradient(180deg, #5f4d3f 0%, #2c231d 100%);
        border-radius: 999px;
      }

      .titan .arm.left { left: 6px; transform: rotate(18deg); }
      .titan .arm.right { right: 6px; transform: rotate(-18deg); }

      .objective-label {
        position: absolute;
        top: 20px;
        right: 90px;
        z-index: 8;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(8, 13, 20, 0.78);
        color: #f3e4b7;
        font-size: 12px;
        border: 1px solid rgba(255,255,255,0.16);
      }

      .monster::before {
        content: "";
        position: absolute;
        left: 50%;
        top: -12px;
        transform: translateX(-50%);
        width: 38px;
        height: 24px;
        background: inherit;
        border-radius: 50%;
      }

      .monster::after {
        content: "";
        position: absolute;
        left: 50%;
        bottom: -12px;
        transform: translateX(-50%);
        width: 72px;
        height: 20px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 50%;
        filter: blur(6px);
      }

      .monster .eye {
        position: absolute;
        top: 40px;
        width: 16px;
        height: 16px;
        background: radial-gradient(circle, #ff4d4d 0%, #8c0000 60%, #2d0000 100%);
        border-radius: 50%;
        box-shadow: 0 0 14px rgba(255, 77, 77, 0.7);
        animation: blink 2.8s infinite;
      }

      .monster .eye.left { left: 24px; }
      .monster .eye.right { right: 24px; }

      .monster .mouth {
        position: absolute;
        left: 50%;
        top: 70px;
        transform: translateX(-50%);
        width: 34px;
        height: 12px;
        border-bottom: 4px solid #5d0000;
        border-radius: 0 0 999px 999px;
      }

      .monster-left { left: 8%; }
      .monster-mid { left: 44%; bottom: 88px; transform: scale(0.95); animation-delay: 0.4s; }
      .monster-right { right: 8%; transform: scale(0.9); animation-delay: 0.8s; }

      .monster-left .eye { top: 38px; }
      .monster-right .eye { top: 42px; }

      @keyframes twinkle {
        0%, 100% { opacity: 0.4; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.2); }
      }

      @keyframes drift {
        from { transform: translateX(-10%); }
        to { transform: translateX(10%); }
      }

      @keyframes blink {
        0%, 92%, 100% { transform: scale(1); opacity: 1; }
        95% { transform: scale(0.15); opacity: 0.3; }
      }

      @keyframes lurch {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-8px) rotate(1.5deg); }
      }
    </style>
  </head>
  <body>
    <div class="forest">
      <div class="craft-panel">
        <button id="houseButton" class="craft-button house" disabled>🏠 Build House</button>
        <button id="craftButton" class="craft-button" disabled>Craft Gun</button>
        <div id="craftStatus" class="craft-status">Iron: 0 / 5</div>
      </div>
      <div class="inventory">
        <h1>Start Gear</h1>
        <div class="item"><span class="icon">🪓</span> Axe</div>
        <div class="item"><span class="icon">⛏️</span> Pickaxe</div>
        <div class="item"><span class="icon">🪹</span> Shovel</div>
        <div class="item"><span class="icon">👜</span> Sack (20 slots)</div>
        <div class="hint">Cut trees, mine iron, dig, and carry your loot.</div>
      </div>
      <div class="moon"></div>
      <div class="stars">
        <span class="star star-1"></span>
        <span class="star star-2"></span>
        <span class="star star-3"></span>
        <span class="star star-4"></span>
        <span class="star star-5"></span>
      </div>
      <div class="fog"></div>
      <div class="fog fog-2"></div>

      <div class="objective-label">Objective: kill the Ultimate Titan</div>
      <div class="objective-mountain"></div>
      <div class="titan">
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm left"></div>
        <div class="arm right"></div>
      </div>

      <div class="hill hill-back"></div>
      <div class="hill hill-mid"></div>
      <div class="hill hill-front"></div>

      <div class="iron iron-a"></div>
      <div class="iron iron-b"></div>
      <div class="iron iron-c"></div>

      <div class="monster monster-left">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="mouth"></span>
      </div>
      <div class="monster monster-mid">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="mouth"></span>
      </div>
      <div class="monster monster-right">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="mouth"></span>
      </div>

      <div class="tree tree-1">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-2">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-3 tree-small">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-4">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-5 tree-small">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-6">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-7 tree-small">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-8">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-9 tree-small">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>
      <div class="tree tree-10">
        <div class="canopy"></div>
        <div class="trunk"></div>
      </div>

      <div class="grass"></div>
      <div id="resourceStatus" class="resource-status">Wood planks: 0</div>
    </div>
    <script>
      const ironNodes = document.querySelectorAll('.iron');
      const treeNodes = document.querySelectorAll('.tree');
      const craftButton = document.getElementById('craftButton');
      const houseButton = document.getElementById('houseButton');
      const craftStatus = document.getElementById('craftStatus');
      const resourceStatus = document.getElementById('resourceStatus');
      let ironCount = 0;
      let woodPlanks = 0;

      ironNodes.forEach((iron) => {
        iron.addEventListener('click', () => {
          ironCount += 1;
          craftStatus.textContent = `Iron: ${ironCount} / 5`;
          iron.remove();
          craftButton.disabled = ironCount < 5;
        });
      });

      treeNodes.forEach((tree) => {
        tree.addEventListener('click', () => {
          woodPlanks += 2;
          resourceStatus.textContent = `Wood planks: ${woodPlanks}`;
          houseButton.disabled = woodPlanks < 30;
          tree.style.opacity = '0';
          tree.style.pointerEvents = 'none';
        });
      });

      houseButton.addEventListener('click', () => {
        if (woodPlanks >= 30) {
          resourceStatus.textContent = 'House built!';
          houseButton.textContent = '🏠 House Ready';
          houseButton.disabled = true;
        }
      });

      craftButton.addEventListener('click', () => {
        if (ironCount >= 5) {
          craftStatus.textContent = 'Gun crafted!';
          craftButton.textContent = 'Gun Ready';
          craftButton.disabled = true;
        }
      });
    </script>
  </body>
</html>
